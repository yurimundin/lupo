# Dependabot configuration for Sec.Basis
# Docs: https://docs.github.com/en/code-security/dependabot

version: 2

updates:
  # NPM dependencies (frontend)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
    groups:
      # Group dev dependencies into one PR per week
      dev-dependencies:
        dependency-type: "development"

  # Cargo dependencies (Rust backend)
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps-rust)"
      include: "scope"
    labels:
      - "dependencies"
      - "rust"

  # GitHub Actions (when we add CI)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(deps-ci)"
    labels:
      - "dependencies"
      - "ci"
